<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Proposta di San Valentino</title>
</head>

<body>
    <div class="container">
        <div class="Mainprompt">
            <img class="image" src="images/catflower.jpg"></img>
            <h1 class="hh" id="name">Hey Polpetta al sugo!</h1>
            <p class="pp" id="question">Vuoi essere il mio Valentino?</p>
            <div class="buttons">
                <button id="no-button" onclick="showMessage('No')">No</button>
                <button onclick="showMessage('Yes')" id="yesButton">Si</button>
            </div>
            <div class="hidden-message" id="no-message">
                <p>Bel tentativo, ma non puoi scappare così facilmente!</p>
            </div>
            <div class="hidden-message" id="yes-message">
                <p>SI GODE! Ti amo tanto Bimba💚</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
